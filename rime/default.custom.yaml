# default.custom.yaml
# encoding: utf-8
#
# 部署位置：
# ~/.config/ibus/rime  (Linux)
# ~/Library/Rime  (Mac OS)
# %APPDATA%\Rime  (Windows)
#
# 於重新部署後生效

patch:
  menu/page_size: 10 #候选词数
  style/horizontal: true # 候选窗水平显示
  menu/alternative_subtags: zh-Hans
  switcher/fold_options: false
  switcher/abbreviate_options: false
  # 定义按键切换策略：
  # inline_ascii 在输入法的临时西文编辑区内输入字母、数字、符号、空格等，回车上屏后自动复位到中文
  # commit_text 已输入的候选文字上屏并切换至英文输入模式
  # commit_code 已输入的编码字符上屏并切换至英文输入模式
  # noop 屏蔽該切換鍵
  ascii_composer/good_old_caps_lock: true
  ascii_composer/switch_key:
    Caps_Lock: noop
    Shift_L: commit_code
    Shift_R: commit_code
    Control_L: noop
    Control_R: noop
  schema_list:
    # 默认仍使用单次空格上屏的简化字方案；语句流保留为可选方案。
    - schema: luna_pinyin_simp
    - schema: luna_pinyin_fluency
      # 也可以保留其他方案以便切换
      # - schema: luna_pinyin
      # - schema: terra_pinyin
      # - schema: bopomofo
  # 针对 luna_pinyin 的自定义
  "schema/luna_pinyin":
    switches:
      - name: simplification
        # states 中 [0] 是繁体， [1] 是简体，默认 0
        # 改成下面这样可以让其一上来就处于简体（索引 1）的状态
        states: ["漢字", "汉字"]
        reset: 1
        initial: 1
  punctuator:
    symbols:
      '.': # 半角句号
        commit: "。"
      ',': # 半角逗号
        commit: "，"
